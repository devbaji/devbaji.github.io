<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <title>Redirecting to devbaji.com</title>
    <meta name="description" content="Redirecting to devbaji.com" />

    <!-- Canonical tag tells search engines where the real content is -->
    <link rel="canonical" href="http://devbaji.com/" />

    <!-- Instant redirect for all browsers -->
    <meta http-equiv="refresh" content="0;url=http://devbaji.com/" />
  </head>
  <body>
    <p>
      If you are not redirected automatically, <a href="http://devbaji.com/">please visit devbaji.com</a>.
    </p>
  </body>
</html>
